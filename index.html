<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Fresh Cookies — £5</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: #fdf6ec;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      position: relative;
      overflow: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 20%, #f5e0c0 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 80% 80%, #fce8c8 0%, transparent 60%);
      z-index: 0;
    }

    .card {
      position: relative;
      z-index: 1;
      background: #fffdf8;
      border-radius: 24px;
      padding: 48px 36px 44px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      border: 1px solid rgba(200, 160, 90, 0.2);
      box-shadow: 0 8px 40px rgba(160, 100, 20, 0.10);
    }

    .icon {
      font-size: 56px;
      display: block;
      margin-bottom: 20px;
      animation: float 3s ease-in-out infinite;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      font-weight: 700;
      color: #3a2a10;
      margin-bottom: 8px;
      line-height: 1.2;
    }

    .subtitle {
      font-size: 15px;
      color: #9a7a50;
      margin-bottom: 10px;
      font-weight: 400;
    }

    .price-badge {
      display: inline-block;
      background: #3a2a10;
      color: #fdf0d8;
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      font-weight: 500;
      padding: 8px 24px;
      border-radius: 100px;
      margin-bottom: 36px;
      letter-spacing: 0.02em;
    }

    .pay-btn {
      display: block;
      width: 100%;
      padding: 20px;
      background: #c07a20;
      color: #fff8ee;
      font-family: 'DM Sans', sans-serif;
      font-size: 17px;
      font-weight: 500;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      letter-spacing: 0.02em;
      transition: background 0.2s, transform 0.1s;
      -webkit-tap-highlight-color: transparent;
    }

    .pay-btn:active {
      background: #a06515;
      transform: scale(0.98);
    }

    .hint {
      margin-top: 18px;
      font-size: 13px;
      color: #b89a6a;
      line-height: 1.5;
    }

    .divider {
      width: 40px;
      height: 1px;
      background: rgba(180,140,80,0.25);
      margin: 28px auto;
    }

    .details {
      font-size: 13px;
      color: #c4a06a;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">🍪</span>
    <h1>Fresh Cookies</h1>
    <p class="subtitle">Stall - Bakery</p>
    <div class="price-badge">£5 per bag</div>

    <a class="pay-btn" href="https://square.link/u/mU2BARCu">Pay £5 now</a>

    <p class="hint">Apple Pay &amp; Google Pay accepted — just choose that option on the next screen</p>

    <div class="divider"></div>
    <p class="details">Apple Pay &amp; Google Pay welcome<br>Contactless · Chip &amp; PIN</p>
  </div>

  <script>
    var APPLICATION_ID = "sq0idp-LkpNaXnTk8FhILIqjGg9jw";
    var CALLBACK_URL = "https://tilly-byte.github.io/Cookies/thankyou.html";
    var AMOUNT_PENCE = 500;
    var CURRENCY = "GBP";

    function pay() {
      var isAndroid = /Android/i.test(navigator.userAgent);

      if (isAndroid) {
        var posUrl = "intent:#Intent;" +
          "action=com.squareup.pos.action.CHARGE;" +
          "package=com.squareup;" +
          "S.com.squareup.pos.WEB_CALLBACK_URI=" + encodeURIComponent(CALLBACK_URL) + ";" +
          "S.com.squareup.pos.CLIENT_ID=" + APPLICATION_ID + ";" +
          "S.com.squareup.pos.API_VERSION=v2.0;" +
          "i.com.squareup.pos.TOTAL_AMOUNT=" + AMOUNT_PENCE + ";" +
          "S.com.squareup.pos.CURRENCY_CODE=" + CURRENCY + ";" +
          "S.com.squareup.pos.TENDER_TYPES=com.squareup.pos.TENDER_CARD,com.squareup.pos.TENDER_CARD_ON_FILE;" +
          "end";
        window.location.href = posUrl;
      } else {
        var data = {
          client_id: APPLICATION_ID,
          sdk_version: "3.1",
          amount_money: { amount: AMOUNT_PENCE, currency_code: CURRENCY },
          callback_url: CALLBACK_URL,
          options: {
            supported_tender_types: ["CREDIT_CARD"],
            auto_return: true
          },
          version: "1.3"
        };
        window.location.href = "square-commerce-v1://payment/create?data=" + encodeURIComponent(JSON.stringify(data));
      }
    }
  </script>
</body>
</html>
