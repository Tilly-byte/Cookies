<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Thank you!</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #fdf6ec;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 32px 20px;
      position: relative;
      overflow: hidden;
    }
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 20%, #d4edc4 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 80% 80%, #fce8c8 0%, transparent 60%);
      z-index: 0;
    }
    .card {
      position: relative;
      z-index: 1;
      background: #fffdf8;
      border-radius: 24px;
      padding: 48px 36px;
      max-width: 360px;
      width: 100%;
      text-align: center;
      border: 1px solid rgba(120,180,80,0.2);
      box-shadow: 0 8px 40px rgba(60,120,20,0.08);
    }
    .icon {
      font-size: 56px;
      display: block;
      margin-bottom: 20px;
      animation: pop 0.4s cubic-bezier(0.34,1.56,0.64,1) both;
    }
    @keyframes pop {
      from { transform: scale(0.5); opacity: 0; }
      to   { transform: scale(1);   opacity: 1; }
    }
    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 30px;
      color: #2a3a10;
      margin-bottom: 10px;
    }
    p {
      font-size: 15px;
      color: #7a9a50;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="card">
    <span class="icon">✅</span>
    <h1>Payment received!</h1>
    <p>Enjoy your cookies — thank you so much!</p>
  </div>
</body>
</html>
